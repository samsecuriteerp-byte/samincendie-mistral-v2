<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E4A"/>
      <stop offset="100%" style="stop-color:#0d1e32"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#C0392B"/>
      <stop offset="60%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Red accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#C0392B"/>

  <!-- Shield shape (protection symbol) -->
  <g transform="translate(120, 115) scale(2.8)">
    <path d="M70 8L10 32v36c0 33.8 24.5 65.5 57.5 73.5C100.5 133.5 125 101.8 125 68V32L70 8z"
          fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <!-- Flame inside shield -->
    <path d="M70 42c-5 7-7 14-5 21s7 12 5 19c7-5 10-12 8-19 5 3.5 7 10.5 5 17.5 5-7 5-17.5-1.5-24.5-2 3.5-3.5 7-3.5 10.5-3.5-7-5-16-8-24.5z"
          fill="url(#flame)"/>
  </g>

  <!-- Vertical separator line -->
  <line x1="420" y1="80" x2="420" y2="550" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Right content -->
  <!-- Main title -->
  <text x="480" y="190" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-1">Sam</text>
  <text x="480" y="270" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#C0392B" letter-spacing="-1">Incendie</text>

  <!-- Tagline -->
  <text x="480" y="330" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.75)" letter-spacing="1">Consultant &amp; Expert en Sécurité Incendie</text>

  <!-- Red divider line -->
  <rect x="480" y="360" width="80" height="4" fill="#C0392B" rx="2"/>

  <!-- Services pills -->
  <rect x="480" y="390" width="130" height="38" rx="19" fill="rgba(192,57,43,0.25)" stroke="#C0392B" stroke-width="1.5"/>
  <text x="545" y="415" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Audit ERP</text>

  <rect x="624" y="390" width="130" height="38" rx="19" fill="rgba(192,57,43,0.25)" stroke="#C0392B" stroke-width="1.5"/>
  <text x="689" y="415" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Formation</text>

  <rect x="768" y="390" width="160" height="38" rx="19" fill="rgba(192,57,43,0.25)" stroke="#C0392B" stroke-width="1.5"/>
  <text x="848" y="415" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Réglementation</text>

  <rect x="942" y="390" width="130" height="38" rx="19" fill="rgba(192,57,43,0.25)" stroke="#C0392B" stroke-width="1.5"/>
  <text x="1007" y="415" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Conseil</text>

  <!-- URL -->
  <text x="480" y="510" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">samincendie.fr</text>

  <!-- Bottom red bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#C0392B" opacity="0.9"/>
  <text x="600" y="621" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" letter-spacing="3">SÉCURITÉ INCENDIE · ERP · IGH · HAB · RÉGLEMENTATION 2026</text>
</svg>
