<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E4A"/>
      <stop offset="55%" style="stop-color:#1d3453"/>
      <stop offset="100%" style="stop-color:#C0392B" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="flameG" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" style="stop-color:#C0392B"/>
      <stop offset="50%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <!-- Dots pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Diagonal split background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Diagonal white overlay right -->
  <polygon points="720,0 1200,0 1200,630 820,630" fill="white" opacity="0.04"/>

  <!-- Large shield / emblem (centered, oversized, watermark style) -->
  <g transform="translate(170, 40) scale(5.5)" opacity="0.08">
    <path d="M40 5L8 18v20c0 18.7 13.6 36.2 31.8 40.7C58.2 79.2 72 61.7 72 41V18L40 5z" fill="white"/>
  </g>

  <!-- Real shield (visible) -->
  <g transform="translate(80, 130) scale(4)">
    <path d="M40 5L8 18v20c0 18.7 13.6 36.2 31.8 40.7C58.2 79.2 72 61.7 72 41V18L40 5z"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <path d="M40 20c-4 6-5.5 12-4 17.5s5.5 9.5 4 15.5c6-4.5 9-10.5 7.5-15.5 4.5 3.5 5.5 9.5 4 15 4.5-6 4.5-15.5-1-21.5-2 3-3.5 6.5-3.5 9.5-3-6.5-5-13.5-7-20.5z"
          fill="url(#flameG)"/>
  </g>

  <!-- Centered big text -->
  <text x="600" y="200" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-3" opacity="0.95">SAM</text>
  <text x="600" y="305" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="#e74c3c" text-anchor="middle" letter-spacing="-3">INCENDIE</text>

  <!-- Thin line separator -->
  <line x1="300" y1="335" x2="900" y2="335" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Tagline centered -->
  <text x="600" y="383" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="4">EXPERT EN SÉCURITÉ INCENDIE</text>

  <!-- 3 icons row -->
  <!-- Audit -->
  <g transform="translate(270, 430)">
    <circle cx="30" cy="20" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">📋</text>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Audit</text>
  </g>

  <!-- Formation -->
  <g transform="translate(470, 430)">
    <circle cx="30" cy="20" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🎓</text>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Formation</text>
  </g>

  <!-- Réglementation -->
  <g transform="translate(670, 430)">
    <circle cx="30" cy="20" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">📚</text>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Réglementation</text>
  </g>

  <!-- Conseil -->
  <g transform="translate(870, 430)">
    <circle cx="30" cy="20" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">💡</text>
    <text x="30" y="60" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Conseil</text>
  </g>

  <!-- URL bottom -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="2">samincendie.fr</text>
</svg>
